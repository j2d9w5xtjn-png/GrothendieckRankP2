name = "finite-flat-group-schemes"
version = "0.1.0"
defaultTargets = ["FiniteFlatGroupSchemes"]

[leanOptions]
autoImplicit = false
relaxedAutoImplicit = false
pp.unicode.fun = true
# Enforce Mathlib's default syntax linters and style options on this project.
weak.linter.mathlibStandardSet = true

[[require]]
name = "mathlib"
git = "https://github.com/leanprover-community/mathlib4.git"
rev = "v4.31.0"

[[lean_lib]]
name = "FiniteFlatGroupSchemes"
